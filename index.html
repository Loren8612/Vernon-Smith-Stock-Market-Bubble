<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
  :root{
    --bg:#152420; --panel:#1c2f28; --panel-2:#213b31; --panel-3:#0f1e1a;
    --ink:#EDEAE0; --ink-dim:#9FB3A8; --ink-faint:#6C8177;
    --bid:#5CC79A; --ask:#E7A05E; --fund:#D9CB93;
    --border: rgba(237,234,224,0.16); --danger:#E2745C; --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; line-height:1.55;}
  body::before{
    content:""; position:fixed; inset:0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 34px);
    pointer-events:none; z-index:0;
  }
  #app{position:relative; z-index:1; max-width:880px; margin:0 auto; padding:20px 16px 60px;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:700; margin:0 0 4px;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--ink-faint); text-transform:uppercase;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .panel{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px;}
  .panel-tight{padding:14px 16px;}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  .row.between{justify-content:space-between;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media (max-width:520px){.grid2{grid-template-columns:1fr;}}
  label{display:block; font-size:12px; color:var(--ink-dim); margin-bottom:5px;}
  input[type=text], input[type=number]{
    width:100%; background:var(--panel-3); border:1px solid var(--border); color:var(--ink);
    border-radius:8px; padding:11px 12px; font-size:15px; font-family:'IBM Plex Mono',monospace;
  }
  input:focus{outline:2px solid var(--bid); outline-offset:1px;}
  button{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; border-radius:8px;
    border:1px solid var(--border); background:var(--panel-2); color:var(--ink); padding:12px 18px;
    cursor:pointer; transition:transform .08s ease, background .15s ease;
  }
  button:hover:not(:disabled){background:#294539;}
  button:active:not(:disabled){transform:scale(0.98);}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  button.primary{background:var(--bid); color:#0c1f17; border-color:var(--bid);}
  button.primary:hover:not(:disabled){background:#6fd6ab;}
  button.warn{background:transparent; color:var(--danger); border-color:var(--danger);}
  button.warn:hover:not(:disabled){background:rgba(226,116,92,0.12);}
  button.ghost{background:transparent;}
  .badge{display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px; padding:4px 10px; border-radius:99px; border:1px solid var(--border); color:var(--ink-dim);}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--ink-faint);}
  .dot.live{background:var(--bid); box-shadow:0 0 0 3px rgba(92,199,154,0.18);}
  .ticker{display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel-3); margin-bottom:16px; flex-wrap:wrap; gap:8px;}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--border);}
  th{color:var(--ink-dim); font-weight:500; font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.04em;}
  td.mono{font-family:'IBM Plex Mono',monospace;}
  .tag-bid{color:var(--bid);} .tag-ask{color:var(--ask);} .tag-fund{color:var(--fund);}
  .divider{height:1px; background:var(--border); margin:16px 0; border:none;}
  .dice-box{width:100%; text-align:center; padding:26px 10px; background:var(--panel-3); border:1px dashed var(--border); border-radius:var(--radius); font-family:'IBM Plex Mono',monospace; font-size:40px; font-weight:600; letter-spacing:0.02em; color:var(--fund);}
  .muted{color:var(--ink-dim); font-size:14px;}
  .small{font-size:12px; color:var(--ink-faint);}
  .role-choice{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){.role-choice{grid-template-columns:1fr;}}
  .role-card{padding:22px; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel); cursor:pointer; transition:border-color .15s ease, background .15s ease;}
  .role-card:hover{border-color:var(--bid); background:#203a30;}
  canvas{max-width:100%;}
  .status-line{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-dim);}
  code{background:var(--panel-3); padding:2px 6px; border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:13px;}
</style>

<script>

  var app = document.getElementById('app');
  if(app && !app.innerHTML.trim()){

      + '<br><br>이 화면을 캡처해서 공유해주세요.</div>';
  }
};

<script>
/* =========================================================================
   1) 여기에 본인의 Firebase 프로젝트 설정값을 붙여넣으세요.
   Firebase 콘솔(console.firebase.google.com) → 프로젝트 설정 → 일반 →
   "내 앱" 섹션의 웹 앱에서 이 형태의 config 객체를 복사할 수 있습니다.
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBxlAWmJLvutf6_xyJ-zA3T1FutMAIVEDo",
  authDomain: "vernon-smith-stock-trade.firebaseapp.com",
  databaseURL: "https://vernon-smith-stock-trade-default-rtdb.firebaseio.com",
  projectId: "vernon-smith-stock-trade"
};
/* ========================================================================= */

const NEEDS_SETUP = firebaseConfig.apiKey === "YOUR_API_KEY";

let db = null;
if(!NEEDS_SETUP){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  }catch(e){
    console.error('Firebase 초기화 실패', e);
  }
}

const DEFAULT_DIVIDENDS = [0,2]; // 50% 확률로 $2 배당 (기대값 $1/라운드)
const FALLBACK_CODE = "stock1234"; // 첫 실행 시 기본 초대 코드. 진행자가 로비 화면에서 언제든 바꿀 수 있습니다.

function defaultConfig(){
  return { status:'lobby', totalRounds:10, dividendValues: DEFAULT_DIVIDENDS.slice(), currentRound:0, hostClaimed:false };
}

async function getJSON(path, fallback){
  try{
    const snap = await db.ref(path).get();
    return snap.exists() ? snap.val() : fallback;
  }catch(e){ console.error('read failed', path, e); return fallback; }
}
async function setJSON(path, val){
  try{ await db.ref(path).set(val); return true; }catch(e){ console.error('write failed', path, e); return false; }
}
async function updatePaths(obj){
  try{ await db.ref().update(obj); return true; }catch(e){ console.error('update failed', obj, e); return false; }
}

function sanitizeName(raw){
  return raw.trim().replace(/\s+/g,'_').replace(/[.#$\[\]\/]/g,'').slice(0,24);
}
function expectedDividend(values){
  if(!values.length) return 0;
  return values.reduce((a,b)=>a+Number(b),0)/values.length;
}
function computeFundamental(round, totalRounds, expDiv){
  return Math.round(expDiv * (totalRounds - round + 1) * 100)/100;
}
function computeEquilibrium(bids, asks){
  const b = bids.slice().sort((x,y)=>y-x);
  const a = asks.slice().sort((x,y)=>x-y);
  const n = Math.min(b.length, a.length);
  let k = 0;
  for(let i=0;i<n;i++){ if(b[i] >= a[i]) k = i+1; else break; }
  if(k===0){
    const bb=b[0], ba=a[0];
    let price=null;
    if(bb!=null && ba!=null) price=(bb+ba)/2; else if(bb!=null) price=bb; else if(ba!=null) price=ba;
    return {price: price!=null ? Math.round(price*100)/100 : null, volume:0};
  }
  const price = (b[k-1]+a[k-1])/2;
  return {price: Math.round(price*100)/100, volume:k};
}
function rollWeightedDividend(values){
  return values[Math.floor(Math.random()*values.length)];
}

const S = {
  role:null, name:'', safeName:'', nameInput:'', hostBlockedMsg:'',
  config:null, round:null, history:[], participantNames:[], orderCount:0,
  myOrder:null, bidInput:'', askInput:'', busy:false, rolling:false, rollDisplay:null,
  confirmingReset:false, editRounds:10, editDividends: DEFAULT_DIVIDENDS.slice(),
  lastUpdated:null, refreshing:false,
  gateOk:false, gateError:'', inviteCode:null
};
let chart = null;

function fmt(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toLocaleString('ko-KR', {maximumFractionDigits:2});
}

async function loadAll(){
  const config = await getJSON('config', defaultConfig());
  const round = await getJSON('round', null);
  const historyObj = await getJSON('history', {});
  S.config = config;
  S.round = round;
  S.history = Object.values(historyObj || {}).sort((a,b)=>a.round-b.round);

  if(S.role === 'host'){
    const participantsObj = await getJSON('participants', {});
    S.participantNames = Object.keys(participantsObj || {});
    if(round && round.status === 'collecting'){
      const ordersObj = await getJSON(`orders/${round.round}`, {});
      S.orderCount = Object.keys(ordersObj || {}).length;
    }
  }
  if(S.role === 'participant' && round){
    S.myOrder = await getJSON(`orders/${round.round}/${S.safeName}`, null);
  }
  S.lastUpdated = new Date();
  render();
}

async function manualRefresh(){
  S.refreshing = true; render();
  await loadAll();
  S.refreshing = false; render();
}

// ---------- Actions ----------

async function claimHost(){
  S.busy = true; render();
  let blocked = false;
  try{
    await db.ref('config').transaction((current)=>{
      if(current && current.hostClaimed){ blocked = true; return; }
      const base = current || defaultConfig();
      base.hostClaimed = true;
      return base;
    });
  }catch(e){ console.error(e); }
  if(blocked){
    S.hostBlockedMsg = '이미 다른 진행자가 접속해 있습니다.';
    S.busy = false; render();
    return;
  }
  const config = await getJSON('config', defaultConfig());
  S.role = 'host';
  S.editRounds = config.totalRounds;
  S.editDividends = config.dividendValues.slice();
  S.busy = false;
  await loadAll();
}

async function joinAsParticipant(){
  const safe = sanitizeName(S.nameInput);
  if(!safe) return;
  S.busy = true; render();
  await setJSON(`participants/${safe}`, {joinedAt: Date.now()});
  S.role = 'participant'; S.name = S.nameInput.trim(); S.safeName = safe;
  S.busy = false;
  await loadAll();
}

async function startSession(){
  S.busy = true; render();
  const totalRounds = Math.max(1, Math.min(60, Number(S.editRounds)||10));
  const dividendValues = S.editDividends.map(v=>Math.max(0, Number(v)||0));
  const expDiv = expectedDividend(dividendValues);
  const config = { status:'active', totalRounds, dividendValues, currentRound:1, hostClaimed:true };
  const round = { round:1, status:'collecting', fundamentalValue: computeFundamental(1, totalRounds, expDiv), clearingPrice:null, volume:null, dividendValue:null };
  await updatePaths({ '/config': config, '/round': round, '/history': null, '/orders': null });
  S.busy = false;
  await loadAll();
}

async function calcEquilibrium(){
  S.busy = true; render();
  const round = S.round;
  const ordersObj = await getJSON(`orders/${round.round}`, {});
  const bids = [], asks = [];
  Object.values(ordersObj || {}).forEach(v=>{
    if(v.bid !== null && v.bid !== undefined && !isNaN(v.bid)) bids.push(Number(v.bid));
    if(v.ask !== null && v.ask !== undefined && !isNaN(v.ask)) asks.push(Number(v.ask));
  });
  const {price, volume} = computeEquilibrium(bids, asks);
  await setJSON('round', {...round, status:'calculated', clearingPrice:price, volume});
  S.busy = false;
  await loadAll();
}

async function rollDice(){
  S.rolling = true; render();
  const values = S.config.dividendValues;
  let ticks = 0;
  const spin = setInterval(()=>{
    S.rollDisplay = values[Math.floor(Math.random()*values.length)];
    render();
    ticks++;
    if(ticks > 14){ clearInterval(spin); finishRoll(values); }
  }, 90);
}
async function finishRoll(values){
  const final = rollWeightedDividend(values);
  S.rollDisplay = final; render();
  const round = S.round;
  const updated = {...round, status:'revealed', dividendValue: final};
  const histEntry = { round: round.round, fundamental: round.fundamentalValue, clearingPrice: round.clearingPrice, volume: round.volume, dividendValue: final };
  await updatePaths({ '/round': updated, [`/history/${round.round}`]: histEntry });
  S.rolling = false;
  await loadAll();
}

async function nextRound(){
  S.busy = true; render();
  const config = S.config;
  const newRoundNum = config.currentRound + 1;
  const expDiv = expectedDividend(config.dividendValues);
  const round = { round:newRoundNum, status:'collecting', fundamentalValue: computeFundamental(newRoundNum, config.totalRounds, expDiv), clearingPrice:null, volume:null, dividendValue:null };
  await updatePaths({ '/config/currentRound': newRoundNum, '/round': round });
  S.busy = false;
  await loadAll();
}

async function endSession(){
  S.busy = true; render();
  await updatePaths({ '/config/status': 'ended' });
  S.busy = false;
  await loadAll();
}

async function submitOrder(){
  const bid = S.bidInput === '' ? null : Number(S.bidInput);
  const ask = S.askInput === '' ? null : Number(S.askInput);
  if((bid===null||isNaN(bid)) && (ask===null||isNaN(ask))) return;
  S.busy = true; render();
  await setJSON(`orders/${S.round.round}/${S.safeName}`, {
    bid: (bid===null||isNaN(bid)) ? null : Math.max(0,bid),
    ask: (ask===null||isNaN(ask)) ? null : Math.max(0,ask),
    submittedAt: Date.now()
  });
  S.busy = false; S.bidInput=''; S.askInput='';
  await loadAll();
}

async function resetSession(){
  S.busy = true; render();
  await updatePaths({ '/config': null, '/round': null, '/history': null, '/participants': null, '/orders': null });
  S.confirmingReset = false; S.busy = false;
  S.editRounds = 10; S.editDividends = DEFAULT_DIVIDENDS.slice();
  await loadAll();
}

// ---------- Chart ----------

let finalChart = null;
let devChart = null;

const CHART_GRID = 'rgba(237,234,224,0.06)';
const CHART_TICK = {color:'#6C8177', font:{size:10}};
const CHART_LEGEND = {labels:{color:'#9FB3A8', font:{family:'IBM Plex Mono', size:11}}};

function updateChart(){
  const el = document.getElementById('priceChart');
  if(!el || typeof Chart === 'undefined') return;
  if(chart){ chart.destroy(); chart = null; }
  const labels = S.history.map(h=>`R${h.round}`);
  const fundData = S.history.map(h=>h.fundamental);
  const priceData = S.history.map(h=>h.clearingPrice);
  if(S.round && S.round.status !== 'collecting' && (S.history.length===0 || S.history[S.history.length-1].round !== S.round.round)){
    labels.push(`R${S.round.round}`);
    fundData.push(S.round.fundamentalValue);
    priceData.push(S.round.status==='collecting' ? null : S.round.clearingPrice);
  }
  chart = new Chart(el.getContext('2d'), {
    type:'line',
    data:{ labels, datasets:[
      { label:'펀더멘털 가치', data: fundData, borderColor:'#D9CB93', backgroundColor:'transparent', borderDash:[5,4], pointRadius:2, tension:0 },
      { label:'체결가', data: priceData, borderColor:'#5CC79A', backgroundColor:'rgba(92,199,154,0.08)', pointRadius:3, tension:0.15, fill:true }
    ]},
    options:{
      responsive:true, animation:{duration:300},
      plugins:{ legend:CHART_LEGEND, tooltip:{mode:'index', intersect:false} },
      scales:{ x:{ticks:CHART_TICK, grid:{color:CHART_GRID}}, y:{ticks:CHART_TICK, grid:{color:CHART_GRID}, beginAtZero:true} }
    }
  });
}

// 최종 분석용 계산: 사후(ex-post) 실제가치 = 그 라운드부터 끝까지 "실제로 지급된" 배당의 합
function computeFinalStats(){
  const hist = S.history;
  const n = hist.length;
  const actualValue = new Array(n).fill(0);
  let cum = 0;
  for(let i=n-1; i>=0; i--){
    cum += (hist[i].dividendValue || 0);
    actualValue[i] = cum;
  }
  const totalDividends = cum; // 1라운드 시점의 실제가치 = 전체 실제 배당 합
  const hits = hist.filter(h=>(h.dividendValue||0)>0).length;
  const deviations = hist.map(h=> (h.clearingPrice!=null) ? Math.round((h.clearingPrice - h.fundamental)*100)/100 : null);
  const validDev = deviations.filter(d=>d!=null);
  const avgDev = validDev.length ? Math.round(validDev.reduce((a,b)=>a+b,0)/validDev.length*100)/100 : null;
  let maxDev = null, maxDevRound = null;
  hist.forEach((h,i)=>{
    if(deviations[i]!=null && (maxDev===null || Math.abs(deviations[i]) > Math.abs(maxDev))){ maxDev = deviations[i]; maxDevRound = h.round; }
  });
  return { actualValue, totalDividends, hits, n, deviations, avgDev, maxDev, maxDevRound };
}

function renderFinalAnalysis(){
  if(!S.history.length) return `<div class="panel"><p class="small">기록된 라운드가 없어 분석을 표시할 수 없습니다.</p></div>`;
  const st = computeFinalStats();
  const initialFund = S.history[0].fundamental;
  return `
    <div class="panel">
      <h3 style="font-size:15px; margin-bottom:8px;">최종 요약</h3>
      <div class="grid2">
        <div><div class="small">이론상 초기 가치 (사전 기대값)</div><div class="mono tag-fund" style="font-size:20px;">${fmt(initialFund)}</div></div>
        <div><div class="small">실제 가치 (실제 배당 총합, 사후 확정)</div><div class="mono tag-bid" style="font-size:20px;">${fmt(st.totalDividends)}</div></div>
        <div><div class="small">배당 성공 횟수</div><div class="mono" style="font-size:20px;">${st.hits} / ${st.n}회</div></div>
        <div><div class="small">평균 괴리 (체결가 − 펀더멘털)</div><div class="mono" style="font-size:20px; color:${(st.avgDev??0)>=0?'var(--ask)':'var(--bid)'};">${st.avgDev!=null ? (st.avgDev>0?'+':'')+fmt(st.avgDev) : '—'}</div></div>
      </div>
      ${st.maxDev!=null ? `<p class="small" style="margin-top:10px;">괴리가 가장 컸던 라운드: R${st.maxDevRound} (${st.maxDev>0?'+':''}${fmt(st.maxDev)})</p>` : ''}
    </div>
    <div class="panel">
      <h3 style="font-size:15px; margin-bottom:4px;">사전 기대가치 · 사후 실제가치 · 체결가</h3>
      <p class="small" style="margin-bottom:12px;">노란 점선은 계산상 기대가치, 흰 실선은 "그 라운드에 사서 끝까지 들고 있었으면 실제로 받았을 배당 총합", 초록 선은 시장에서 실제 체결된 가격입니다.</p>
      <canvas id="finalChart" height="170"></canvas>
    </div>
    <div class="panel">
      <h3 style="font-size:15px; margin-bottom:4px;">라운드별 괴리 (체결가 − 펀더멘털)</h3>
      <p class="small" style="margin-bottom:12px;">0보다 위면 과대평가(버블 방향), 아래면 과소평가입니다.</p>
      <canvas id="devChart" height="150"></canvas>
    </div>
    <div class="panel"><h3 style="font-size:15px; margin-bottom:10px;">전체 라운드 기록</h3>${renderHistoryTable()}</div>
  `;
}

function updateFinalCharts(){
  if(typeof Chart === 'undefined' || !S.history.length) return;
  const st = computeFinalStats();
  const labels = S.history.map(h=>`R${h.round}`);

  const finalEl = document.getElementById('finalChart');
  if(finalEl){
    if(finalChart){ finalChart.destroy(); finalChart = null; }
    finalChart = new Chart(finalEl.getContext('2d'), {
      type:'line',
      data:{ labels, datasets:[
        { label:'사전 기대가치', data: S.history.map(h=>h.fundamental), borderColor:'#D9CB93', backgroundColor:'transparent', borderDash:[5,4], pointRadius:2, tension:0 },
        { label:'사후 실제가치', data: st.actualValue, borderColor:'#EDEAE0', backgroundColor:'transparent', pointRadius:3, tension:0, borderWidth:2 },
        { label:'체결가', data: S.history.map(h=>h.clearingPrice), borderColor:'#5CC79A', backgroundColor:'rgba(92,199,154,0.08)', pointRadius:3, tension:0.15, fill:true }
      ]},
      options:{
        responsive:true, animation:{duration:400},
        plugins:{ legend:CHART_LEGEND, tooltip:{mode:'index', intersect:false} },
        scales:{ x:{ticks:CHART_TICK, grid:{color:CHART_GRID}}, y:{ticks:CHART_TICK, grid:{color:CHART_GRID}, beginAtZero:true} }
      }
    });
  }

  const devEl = document.getElementById('devChart');
  if(devEl){
    if(devChart){ devChart.destroy(); devChart = null; }
    devChart = new Chart(devEl.getContext('2d'), {
      type:'bar',
      data:{ labels, datasets:[{
        label:'체결가 − 펀더멘털',
        data: st.deviations,
        backgroundColor: st.deviations.map(d=> d==null ? 'rgba(108,129,119,0.4)' : (d>=0 ? 'rgba(231,160,94,0.7)' : 'rgba(92,199,154,0.7)')),
        borderColor: st.deviations.map(d=> d==null ? '#6C8177' : (d>=0 ? '#E7A05E' : '#5CC79A')),
        borderWidth:1
      }]},
      options:{
        responsive:true, animation:{duration:400},
        plugins:{ legend:{display:false}, tooltip:{mode:'index', intersect:false} },
        scales:{ x:{ticks:CHART_TICK, grid:{color:CHART_GRID}}, y:{ticks:CHART_TICK, grid:{color:CHART_GRID}} }
      }
    });
  }
}

// ---------- Render ----------

function render(){
  const app = document.getElementById('app');
  if(NEEDS_SETUP){ app.innerHTML = renderSetupNeeded(); return; }
  if(!S.gateOk){ app.innerHTML = renderGate(); attachGateEvents(); return; }
  if(!S.role){ app.innerHTML = renderRoleSelect(); attachRoleEvents(); return; }
  if(S.role === 'host'){ app.innerHTML = renderHost(); attachHostEvents(); requestAnimationFrame(()=>{ updateChart(); updateFinalCharts(); }); return; }
  if(S.role === 'participant'){ app.innerHTML = renderParticipant(); attachParticipantEvents(); requestAnimationFrame(()=>{ updateChart(); updateFinalCharts(); }); return; }
}

function renderGate(){
  return `
    <div class="eyebrow">access</div>
    <h1 style="font-size:24px; margin-bottom:6px;">초대 코드 입력</h1>
    <p class="muted" style="margin-bottom:18px;">진행자에게 받은 초대 코드를 입력하세요.</p>
    <div class="panel panel-tight">
      <label for="gateField">초대 코드</label>
      <div class="row">
        <div style="flex:1;"><input id="gateField" type="text" placeholder="코드 입력" autocomplete="off" /></div>
        <button class="primary" id="gateBtn">입장</button>
      </div>
      ${S.gateError ? `<p class="small" style="color:var(--danger); margin-top:8px;">${S.gateError}</p>` : ''}
    </div>
  `;
}
function attachGateEvents(){
  const field = document.getElementById('gateField');
  const btn = document.getElementById('gateBtn');
  const submit = ()=>{
    const val = (field.value||'').trim();
    if(val && S.inviteCode && val.toUpperCase() === String(S.inviteCode).toUpperCase()){
      S.gateOk = true; S.gateError = '';
      try{ sessionStorage.setItem('bubblelab_gate','ok'); }catch(e){}
      render();
    } else {
      S.gateError = '코드가 일치하지 않습니다.';
      render();
    }
  };
  if(field){ field.focus(); field.onkeydown = (e)=>{ if(e.key==='Enter') submit(); }; }
  if(btn) btn.onclick = submit;
}

function renderSetupNeeded(){
  return `
    <div class="eyebrow">setup required</div>
    <h1 style="font-size:22px;">Firebase 설정이 필요합니다</h1>
    <div class="panel">
      <p class="muted">이 파일 맨 위 <code>firebaseConfig</code> 부분에 본인의 Firebase 프로젝트 설정값을 붙여넣어야 동작합니다.</p>
      <ol class="muted" style="padding-left:20px;">
        <li>console.firebase.google.com 에서 새 프로젝트 생성 (무료 Spark 요금제)</li>
        <li>왼쪽 메뉴에서 Build → Realtime Database → 데이터베이스 만들기</li>
        <li>프로젝트 설정 → 일반 → "내 앱"에서 웹 앱 추가 → config 객체 복사</li>
        <li>이 HTML 파일 상단의 firebaseConfig 자리에 붙여넣고 다시 저장</li>
      </ol>
    </div>
  `;
}

function renderRoleSelect(){
  return `
    <h2 class="sr-only">자산시장 버블 실험실 진입 화면</h2>
    <div class="eyebrow">asset bubble lab</div>
    <h1 style="font-size:26px; margin-bottom:6px;">자산시장 버블 실험실</h1>
    <p class="muted" style="margin-bottom:22px;">콜마켓 방식으로 진행되는 실시간 자산가격 실험 도구입니다.</p>
    <div class="role-choice">
      <div class="role-card" id="hostCard">
        <div class="eyebrow" style="margin-bottom:8px;">1인</div>
        <h3 style="font-size:18px;">진행자로 입장</h3>
        <p class="muted" style="font-size:13px; margin-top:6px;">라운드 진행, 균형가 계산, 배당 추첨을 담당합니다.</p>
      </div>
      <div class="role-card" id="participantCard">
        <div class="eyebrow" style="margin-bottom:8px;">여러 명</div>
        <h3 style="font-size:18px;">참가자로 입장</h3>
        <p class="muted" style="font-size:13px; margin-top:6px;">매 라운드 매수·매도 희망가를 제출합니다.</p>
      </div>
    </div>
    <div id="joinForm" style="display:none; margin-top:16px;">
      <div class="panel panel-tight">
        <label for="nameField">참가자 이름</label>
        <div class="row">
          <div style="flex:1;"><input id="nameField" type="text" placeholder="예: 지민" maxlength="24" /></div>
          <button class="primary" id="joinBtn">입장하기</button>
        </div>
      </div>
    </div>
    ${S.hostBlockedMsg ? `<div class="panel panel-tight" style="border-color:var(--danger); color:var(--danger); margin-top:14px;">${S.hostBlockedMsg}</div>` : ''}
  `;
}
function attachRoleEvents(){
  const hostCard = document.getElementById('hostCard');
  const partCard = document.getElementById('participantCard');
  const joinForm = document.getElementById('joinForm');
  if(hostCard) hostCard.onclick = claimHost;
  if(partCard) partCard.onclick = ()=>{ joinForm.style.display='block'; document.getElementById('nameField').focus(); };
  const nameField = document.getElementById('nameField');
  const joinBtn = document.getElementById('joinBtn');
  if(nameField) nameField.oninput = (e)=>{ S.nameInput = e.target.value; };
  if(nameField) nameField.onkeydown = (e)=>{ if(e.key==='Enter') joinAsParticipant(); };
  if(joinBtn) joinBtn.onclick = joinAsParticipant;
}

function statusBadge(){
  const st = S.config ? S.config.status : 'lobby';
  const label = st==='lobby' ? '대기 중' : st==='active' ? '진행 중' : '종료됨';
  return `<span class="badge"><span class="dot ${st==='active'?'live':''}"></span>${label}</span>`;
}
function renderTicker(){
  const c = S.config; const r = S.round;
  const updated = S.lastUpdated ? S.lastUpdated.toLocaleTimeString('ko-KR') : '아직 없음';
  return `
    <div class="ticker">
      <div class="status-line">${statusBadge()}<span class="mono">${c && c.status!=='lobby' ? `라운드 ${r?r.round:c.currentRound} / ${c.totalRounds}` : '세션 준비 중'}</span></div>
      <div class="status-line mono">${r ? `펀더멘털 가치 <span class="tag-fund">${fmt(r.fundamentalValue)}</span>` : ''}</div>
      <div class="row" style="gap:10px;">
        <span class="small mono">확인 시각 ${updated}</span>
        <button class="ghost" id="refreshBtn" ${S.refreshing?'disabled':''}>${S.refreshing?'새로고침 중…':'⟳ 새로고침'}</button>
      </div>
    </div>
  `;
}
function renderHistoryTable(){
  if(!S.history.length) return `<p class="small">아직 완료된 라운드가 없습니다.</p>`;
  return `
    <table>
      <thead><tr><th>라운드</th><th>펀더멘털</th><th>체결가</th><th>거래량</th><th>배당 결과</th></tr></thead>
      <tbody>
        ${S.history.map(h=>{
          const hit = (h.dividendValue||0) > 0;
          return `
          <tr>
            <td class="mono">${h.round}</td>
            <td class="mono tag-fund">${fmt(h.fundamental)}</td>
            <td class="mono tag-bid">${fmt(h.clearingPrice)}</td>
            <td class="mono">${h.volume ?? '—'}</td>
            <td class="mono">${hit ? `<span class="tag-bid">✓ 성공 (+${fmt(h.dividendValue)})</span>` : `<span style="color:var(--danger)">✗ 실패 (0)</span>`}</td>
          </tr>`;}).join('')}
      </tbody>
    </table>
  `;
}
function renderChartBlock(){
  return `<div class="panel"><h3 style="font-size:15px; margin-bottom:12px;">펀더멘털 가치 vs 체결가</h3><canvas id="priceChart" height="160"></canvas></div>`;
}

function renderHost(){
  const c = S.config || defaultConfig();
  const r = S.round;
  let body = '';
  if(c.status === 'lobby'){
    body = `
      <div class="panel panel-tight">
        <label for="codeField">초대 코드 (참가자에게 공유하세요)</label>
        <div class="row">
          <div style="flex:1;"><input id="codeField" class="mono" type="text" value="${S.inviteCode||''}" /></div>
          <button class="ghost" id="codeSaveBtn">변경</button>
        </div>
      </div>
      <div class="panel">
        <h3 style="font-size:16px;">세션 설정</h3>
        <p class="muted" style="font-size:13px; margin-bottom:14px;">라운드 수와 배당 확률표를 정한 뒤 세션을 시작하세요. 접속한 참가자: <span class="mono tag-bid">${S.participantNames.length}명</span></p>
        <div class="grid2">
          <div><label for="roundsField">총 라운드 수</label><input id="roundsField" type="number" min="1" max="60" value="${S.editRounds}" /></div>
          <div><label>배당 기대값 (자동 계산)</label><input type="text" class="mono" value="${fmt(expectedDividend(S.editDividends))} 포인트" disabled /></div>
        </div>
        <div class="divider"></div>
        <label>라운드마다 동일 확률로 지급되는 배당 값 목록 (기본: 0 또는 2 → 50% 확률로 $2, 기대값 $1)</label>
        <div class="grid2" style="margin-top:8px;">
          ${S.editDividends.map((v,i)=>`<div><label>값 ${i+1}</label><input class="mono divInput" data-idx="${i}" type="number" min="0" value="${v}" /></div>`).join('')}
        </div>
        <div class="divider"></div>
        <button class="primary" id="startBtn" ${S.participantNames.length===0?'disabled':''}>세션 시작</button>
        ${S.participantNames.length===0 ? `<p class="small" style="margin-top:8px;">참가자가 최소 1명 접속해야 시작할 수 있습니다.</p>` : ''}
      </div>
      <div class="panel">
        <h3 style="font-size:15px; margin-bottom:8px;">접속한 참가자</h3>
        ${S.participantNames.length ? `<div class="row">${S.participantNames.map(n=>`<span class="badge">${n}</span>`).join('')}</div>` : `<p class="small">아직 없음</p>`}
      </div>
    `;
  } else if(c.status === 'active' && r){
    let controls = '';
    if(r.status === 'collecting'){
      controls = `
        <div class="panel">
          <div class="row between">
            <div><h3 style="font-size:16px;">제출 현황</h3><p class="muted mono" style="font-size:13px;">${S.orderCount} / ${S.participantNames.length} 제출됨</p></div>
            <button class="primary" id="calcBtn">균형가 계산</button>
          </div>
        </div>`;
    } else if(r.status === 'calculated'){
      controls = `
        <div class="panel">
          <div class="row between" style="margin-bottom:14px;">
            <div><div class="small">균형 체결가</div><div class="mono tag-bid" style="font-size:24px;">${fmt(r.clearingPrice)}</div><div class="small">거래량 ${r.volume ?? 0}건</div></div>
            <button class="primary" id="rollBtn" ${S.rolling?'disabled':''}>${S.rolling?'추첨 중...':'배당 추첨'}</button>
          </div>
          ${S.rolling ? `<div class="dice-box">${S.rollDisplay ?? '?'}</div>` : ''}
        </div>`;
    } else if(r.status === 'revealed'){
      const isLast = r.round >= c.totalRounds;
      controls = `
        <div class="panel">
          <div class="grid2" style="margin-bottom:14px;">
            <div><div class="small">체결가</div><div class="mono tag-bid" style="font-size:20px;">${fmt(r.clearingPrice)}</div></div>
            <div><div class="small">이번 배당</div><div class="mono" style="font-size:20px;">${fmt(r.dividendValue)}</div></div>
          </div>
          <button class="primary" id="${isLast?'endBtn':'nextBtn'}">${isLast?'세션 종료':'다음 라운드'}</button>
        </div>`;
    }
    body = `${controls}${renderChartBlock()}<div class="panel"><h3 style="font-size:15px; margin-bottom:10px;">라운드 기록</h3>${renderHistoryTable()}</div>`;
  } else if(c.status === 'ended'){
    body = `
      <div class="panel"><h3 style="font-size:18px;">세션이 종료되었습니다</h3><p class="muted" style="font-size:13px;">아래 최종 분석으로 펀더멘털·실제가치·체결가의 차이를 참가자들과 함께 복기해보세요.</p></div>
      ${renderFinalAnalysis()}
    `;
  }
  return `
    <h2 class="sr-only">진행자 화면</h2>
    <div class="eyebrow">host</div>
    <h1 style="font-size:22px; margin-bottom:10px;">진행자 콘솔</h1>
    ${renderTicker()}
    ${body}
    <hr class="divider"/>
    ${S.confirmingReset ? `
      <div class="panel panel-tight" style="border-color:var(--danger);">
        <p style="font-size:13px; margin-bottom:10px;">정말 초기화할까요? 모든 라운드 기록과 참가자 데이터가 삭제됩니다.</p>
        <div class="row"><button class="warn" id="confirmResetBtn">초기화 확정</button><button class="ghost" id="cancelResetBtn">취소</button></div>
      </div>
    ` : `<button class="ghost warn" id="resetBtn">세션 초기화</button>`}
  `;
}
function attachHostEvents(){
  const refreshBtn = document.getElementById('refreshBtn');
  if(refreshBtn) refreshBtn.onclick = manualRefresh;
  const codeField = document.getElementById('codeField');
  const codeSaveBtn = document.getElementById('codeSaveBtn');
  if(codeSaveBtn) codeSaveBtn.onclick = async ()=>{
    const val = (codeField.value||'').trim();
    if(!val) return;
    await setJSON('settings/inviteCode', val);
    S.inviteCode = val;
    render();
  };
  const roundsField = document.getElementById('roundsField');
  if(roundsField) roundsField.oninput = (e)=>{ S.editRounds = e.target.value; };
  document.querySelectorAll('.divInput').forEach(inp=>{ inp.oninput = (e)=>{ S.editDividends[Number(e.target.dataset.idx)] = e.target.value; }; });
  const startBtn = document.getElementById('startBtn'); if(startBtn) startBtn.onclick = startSession;
  const calcBtn = document.getElementById('calcBtn'); if(calcBtn) calcBtn.onclick = calcEquilibrium;
  const rollBtn = document.getElementById('rollBtn'); if(rollBtn) rollBtn.onclick = rollDice;
  const nextBtn = document.getElementById('nextBtn'); if(nextBtn) nextBtn.onclick = nextRound;
  const endBtn = document.getElementById('endBtn'); if(endBtn) endBtn.onclick = endSession;
  const resetBtn = document.getElementById('resetBtn'); if(resetBtn) resetBtn.onclick = ()=>{ S.confirmingReset = true; render(); };
  const confirmResetBtn = document.getElementById('confirmResetBtn'); if(confirmResetBtn) confirmResetBtn.onclick = resetSession;
  const cancelResetBtn = document.getElementById('cancelResetBtn'); if(cancelResetBtn) cancelResetBtn.onclick = ()=>{ S.confirmingReset = false; render(); };
}

function renderParticipant(){
  const c = S.config || defaultConfig();
  const r = S.round;
  let body = '';
  if(!c || c.status === 'lobby'){
    body = `<div class="panel"><p class="muted">호스트가 세션을 준비하고 있습니다. 곧 시작됩니다.</p></div>`;
  } else if(c.status === 'active' && r){
    if(r.status === 'collecting'){
      if(S.myOrder){
        body = `
          <div class="panel">
            <p class="muted">제출 완료. 다른 참가자를 기다리는 중입니다.</p>
            <div class="grid2" style="margin-top:10px;">
              <div><div class="small">내 매수 희망가</div><div class="mono tag-bid">${S.myOrder.bid!=null?fmt(S.myOrder.bid):'—'}</div></div>
              <div><div class="small">내 매도 희망가</div><div class="mono tag-ask">${S.myOrder.ask!=null?fmt(S.myOrder.ask):'—'}</div></div>
            </div>
          </div>`;
      } else {
        body = `
          <div class="panel">
            <h3 style="font-size:16px; margin-bottom:4px;">이번 라운드 희망가 제출</h3>
            <p class="small" style="margin-bottom:14px;">둘 다 채우지 않아도 됩니다. 사고 싶으면 매수가만, 팔고 싶으면 매도가만 입력하세요.</p>
            <div class="grid2">
              <div><label for="bidField" class="tag-bid">매수 희망가 (사고 싶은 가격)</label><input id="bidField" class="mono" type="number" min="0" placeholder="예: 22" /></div>
              <div><label for="askField" class="tag-ask">매도 희망가 (팔고 싶은 가격)</label><input id="askField" class="mono" type="number" min="0" placeholder="예: 26" /></div>
            </div>
            <button class="primary" id="submitBtn" style="margin-top:14px;" ${S.busy?'disabled':''}>제출하기</button>
          </div>`;
      }
    } else if(r.status === 'calculated'){
      body = `<div class="panel"><div class="small">균형 체결가</div><div class="mono tag-bid" style="font-size:24px;">${fmt(r.clearingPrice)}</div><p class="muted" style="margin-top:8px;">호스트가 배당을 추첨하는 중입니다...</p></div>`;
    } else if(r.status === 'revealed'){
      body = `
        <div class="panel">
          <div class="grid2">
            <div><div class="small">체결가</div><div class="mono tag-bid" style="font-size:20px;">${fmt(r.clearingPrice)}</div></div>
            <div><div class="small">이번 배당</div><div class="mono" style="font-size:20px;">${fmt(r.dividendValue)}</div></div>
          </div>
          <p class="muted" style="margin-top:10px;">호스트가 다음 라운드를 시작하면 자동으로 넘어갑니다.</p>
        </div>`;
    }
    body += renderChartBlock();
  } else if(c.status === 'ended'){
    body = `
      <div class="panel"><h3 style="font-size:18px;">세션이 종료되었습니다</h3><p class="muted" style="font-size:13px;">수고하셨습니다. 아래 최종 분석에서 전체 흐름을 복기해보세요.</p></div>
      ${renderFinalAnalysis()}
    `;
  }
  return `
    <h2 class="sr-only">참가자 화면</h2>
    <div class="eyebrow">participant · ${S.name}</div>
    <h1 style="font-size:22px; margin-bottom:10px;">거래 화면</h1>
    ${renderTicker()}
    ${body}
  `;
}
function attachParticipantEvents(){
  const refreshBtn = document.getElementById('refreshBtn');
  if(refreshBtn) refreshBtn.onclick = manualRefresh;
  const bidField = document.getElementById('bidField');
  const askField = document.getElementById('askField');
  if(bidField) bidField.oninput = (e)=>{ S.bidInput = e.target.value; };
  if(askField) askField.oninput = (e)=>{ S.askInput = e.target.value; };
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.onclick = submitOrder;
}
async function init(){
  if(NEEDS_SETUP){ render(); return; }
  S.inviteCode = await getJSON('settings/inviteCode', FALLBACK_CODE);
  try{
    if(sessionStorage.getItem('bubblelab_gate') === 'ok') S.gateOk = true;
  }catch(e){}
  render();
}
init();
</script>
</body>
</html>
