<style>
  :root{
    --bg:#152420; --panel:#1c2f28; --panel-2:#213b31; --panel-3:#0f1e1a;
    --ink:#EDEAE0; --ink-dim:#9FB3A8; --ink-faint:#6C8177;
    --bid:#5CC79A; --ask:#E7A05E; --fund:#D9CB93;
    --border: rgba(237,234,224,0.16); --danger:#E2745C; --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; line-height:1.55;}
  body::before{
    content:""; position:fixed; inset:0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 34px);

  #app{position:relative; z-index:1; max-width:880px; margin:0 auto; padding:20px 16px 60px;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:700; margin:0 0 4px;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.08em; color:var(--ink-faint); text-transform:uppercase;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .panel{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px;}
  .panel-tight{padding:14px 16px;}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  .row.between{justify-content:space-between;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media (max-width:520px){.grid2{grid-template-columns:1fr;}}
  label{display:block; font-size:12px; color:var(--ink-dim); margin-bottom:5px;}
  input[type=text], input[type=number]{
    width:100%; background:var(--panel-3); border:1px solid var(--border); color:var(--ink);
    border-radius:8px; padding:11px 12px; font-size:15px; font-family:'IBM Plex Mono',monospace;
  }
  input:focus{outline:2px solid var(--bid); outline-offset:1px;}
  button{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; border-radius:8px;
    border:1px solid var(--border); background:var(--panel-2); color:var(--ink); padding:12px 18px;
    cursor:pointer; transition:transform .08s ease, background .15s ease;
  }
  button:hover:not(:disabled){background:#294539;}
  button:active:not(:disabled){transform:scale(0.98);}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  button.primary{background:var(--bid); color:#0c1f17; border-color:var(--bid);}
  button.primary:hover:not(:disabled){background:#6fd6ab;}
  button.warn{background:transparent; color:var(--danger); border-color:var(--danger);}
  button.warn:hover:not(:disabled){background:rgba(226,116,92,0.12);}
  button.ghost{background:transparent;}
  .badge{display:inline-flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px; padding:4px 10px; border-radius:99px; border:1px solid var(--border); color:var(--ink-dim);}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--ink-faint);}
  .dot.live{background:var(--bid); box-shadow:0 0 0 3px rgba(92,199,154,0.18);}
  .ticker{display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel-3); margin-bottom:16px; flex-wrap:wrap; gap:8px;}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--border);}
  th{color:var(--ink-dim); font-weight:500; font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.04em;}
  td.mono{font-family:'IBM Plex Mono',monospace;}
  .tag-bid{color:var(--bid);} .tag-ask{color:var(--ask);} .tag-fund{color:var(--fund);}
  .divider{height:1px; background:var(--border); margin:16px 0; border:none;}
  .dice-box{width:100%; text-align:center; padding:26px 10px; background:var(--panel-3); border:1px dashed var(--border); border-radius:var(--radius); font-family:'IBM Plex Mono',monospace; font-size:40px; font-weight:600; letter-spacing:0.02em; color:var(--fund);}
  .muted{color:var(--ink-dim); font-size:14px;}
  .small{font-size:12px; color:var(--ink-faint);}
  .role-choice{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){.role-choice{grid-template-columns:1fr;}}
  .role-card{padding:22px; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel); cursor:pointer; transition:border-color .15s ease, background .15s ease;}
  .role-card:hover{border-color:var(--bid); background:#203a30;}
  canvas{max-width:100%;}
  .status-line{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-dim);}
  code{background:var(--panel-3); padding:2px 6px; border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:13px;}

<script>
/* =========================================================================
   1) 여기에 본인의 Firebase 프로젝트 설정값을 붙여넣으세요.
   Firebase 콘솔(console.firebase.google.com) → 프로젝트 설정 → 일반 →
   "내 앱" 섹션의 웹 앱에서 이 형태의 config 객체를 복사할 수 있습니다.
   ========================================================================= */
 const firebaseConfig = {
  apiKey: "AIzaSyBxlAWmJLvutf6_xyJ-zA3T1FutMAIVEDo",  
  authDomain: "vernon-smith-stock-trade.firebaseapp.com",
  databaseURL: "https://vernon-smith-stock-trade-default-rtdb.asia-southeast1.firebasedatabase.app",

 };
/* ========================================================================= */

const NEEDS_SETUP = firebaseConfig.apiKey === "YOUR_API_KEY";

let db = null;
if(!NEEDS_SETUP){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  }catch(e){
    console.error('Firebase 초기화 실패', e);
  }
}

const DEFAULT_DIVIDENDS = [0,2]; // 50% 확률로 $2 배당 (기대값 $1/라운드)
const FALLBACK_CODE = "stock1234"; // 첫 실행 시 기본 초대 코드. 진행자가 로비 화면에서 언제든 바꿀 수 있습니다.

function defaultConfig(){
  return { status:'lobby', totalRounds:10, dividendValues: DEFAULT_DIVIDENDS.slice(), currentRound:0, hostClaimed:false };
}

function withTimeout(promise, ms){
  return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error('DB timeout')), ms))]);
}
async function getJSON(path, fallback){
  try{
    const snap = await withTimeout(db.ref(path).get(), 7000);
    return snap.exists() ? snap.val() : fallback;
  }catch(e){ console.error('read failed', path, e); return fallback; }
}
async function setJSON(path, val){
  try{ await withTimeout(db.ref(path).set(val), 7000); return true; }catch(e){ console.error('write failed', path, e); return false; }
}
async function updatePaths(obj){
  try{ await withTimeout(db.ref().update(obj), 7000); return true; }catch(e){ console.error('update failed', obj, e); return false; }
}

function sanitizeName(raw){
  return raw.trim().replace(/\s+/g,'_').replace(/[.#$\[\]\/]/g,'').slice(0,24);
}
function expectedDividend(values){
  if(!values.length) return 0;
  return values.reduce((a,b)=>a+Number(b),0)/values.length;
}
function computeFundamental(round, totalRounds, expDiv){
  return Math.round(expDiv * (totalRounds - round + 1) * 100)/100;
}
function computeEquilibrium(bids, asks){
  const b = bids.slice().sort((x,y)=>y-x);
  const a = asks.slice().sort((x,y)=>x-y);
  const n = Math.min(b.length, a.length);
  let k = 0;
  for(let i=0;i<n;i++){ if(b[i] >= a[i]) k = i+1; else break; }
  if(k===0){
    const bb=b[0], ba=a[0];
    let price=null;
    if(bb!=null && ba!=null) price=(bb+ba)/2; else if(bb!=null) price=bb; else if(ba!=null) price=ba;
    return {price: price!=null ? Math.round(price*100)/100 : null, volume:0};
  }
  const price = (b[k-1]+a[k-1])/2;
  return {price: Math.round(price*100)/100, volume:k};
}
function rollWeightedDividend(values){
  return values[Math.floor(Math.random()*values.length)];
}

const S = {
  role:null, name:'', safeName:'', nameInput:'', hostBlockedMsg:'',
  config:null, round:null, history:[], participantNames:[], orderCount:0,
  myOrder:null, bidInput:'', askInput:'', bidQty:'1', askQty:'1', busy:false, rolling:false, rollDisplay:null,
  confirmingReset:false, editRounds:10, editDividends: DEFAULT_DIVIDENDS.slice(),
  lastUpdated:null, refreshing:false,
  gateOk:false, gateError:'', inviteCode:null, dbStatus:'checking'
};
let chart = null;

function fmt(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toLocaleString('ko-KR', {maximumFractionDigits:2});
}

async function loadAll(){
  // 읽기 실패(타임아웃) 시 화면이 초기 상태로 되돌아가지 않도록, 이전 상태를 대체값으로 사용
  const config = await getJSON('config', S.config || defaultConfig());
  const round = await getJSON('round', S.round || null);
  const historyObj = await getJSON('history', null);
  S.config = config;
  S.round = round;
  if(historyObj !== null) S.history = Object.values(historyObj || {}).sort((a,b)=>a.round-b.round);

  const participantsObj = await getJSON('participants', null);
  if(participantsObj !== null) S.participantNames = Object.keys(participantsObj || {});
  const playersObj = await getJSON('players', null);
  if(playersObj !== null) S.players = playersObj;
  S.myPlayer = (S.safeName && S.players) ? (S.players[S.safeName] || null) : null;

  if(S.role === 'host'){
    if(round && round.status === 'collecting'){
      const ordersObj = await getJSON(`orders/${round.round}`, {});
      S.orderCount = Object.keys(ordersObj || {}).length;
    }
  }
  if(S.role === 'participant' && round){
    S.myOrder = await getJSON(`orders/${round.round}/${S.safeName}`, null);
  }
  S.lastUpdated = new Date();
  render();
}

async function manualRefresh(){
  S.refreshing = true; render();
  await loadAll();
  S.refreshing = false; render();
}

// ---------- Actions ----------

async function claimHost(){
  S.busy = true; render();
  let blocked = false;
  try{
    await withTimeout(db.ref('config').transaction((current)=>{
      if(current && current.hostClaimed){ blocked = true; return; }
      const base = current || defaultConfig();
      base.hostClaimed = true;
      return base;
    }), 7000);
  }catch(e){ console.error(e); }
  if(blocked){
    S.hostBlockedMsg = '이미 다른 진행자가 접속해 있습니다.';
    S.busy = false; render();
    return;
  }
  const config = await getJSON('config', defaultConfig());
  S.role = 'host';
  S.editRounds = config.totalRounds;
  S.editDividends = config.dividendValues.slice();
  S.busy = false;
  await loadAll();
}

async function forceHost(){
  S.busy = true; render();
  const config = await getJSON('config', defaultConfig());
  config.hostClaimed = true;
  await setJSON('config', config);
  S.hostBlockedMsg = '';
  S.role = 'host';
  S.editRounds = config.totalRounds;
  S.editDividends = (config.dividendValues || DEFAULT_DIVIDENDS).slice();
  S.busy = false;
  await loadAll();
}

async function joinAsParticipant(){
  const safe = sanitizeName(S.nameInput);
  if(!safe) return;
  S.busy = true; S.joinError = ''; render();
  const cfg = await getJSON('config', null);
  const existing = await getJSON(`participants/${safe}`, null);
  if(cfg && cfg.status === 'active' && !existing){
    S.busy = false;
    S.joinError = '진행 중에는 새 참가자가 입장할 수 없습니다. 실수로 나간 경우, 기존에 쓰던 이름을 정확히 입력하면 세션을 인계받을 수 있습니다.';
    render();
    return;
  }
  S.rejoined = !!(cfg && cfg.status === 'active' && existing);
  const ok = await setJSON(`participants/${safe}`, {joinedAt: existing && existing.joinedAt ? existing.joinedAt : Date.now(), rejoinedAt: S.rejoined ? Date.now() : null});
  if(!ok){
    S.busy = false;
    S.joinError = '서버에 저장하지 못했습니다. Firebase 규칙이 쓰기를 허용하는지(테스트 모드) 확인하세요.';
    render();
    return;
  }
  S.role = 'participant'; S.name = S.nameInput.trim(); S.safeName = safe;
  S.busy = false;
  await loadAll();
}

// 초기 자산 배분: 총자산 100 = 현금 + (주식 × 초기가격). 극단적 불균형으로 거래를 강제한다.
function allocateHoldings(names, price){
  const maxShares = Math.max(1, Math.floor(100 / price)); // 기본 설정에서 10주
  const shuffled = names.slice().sort(()=>Math.random()-0.5);
  const res = {};
  shuffled.forEach((n, i)=>{
    let shares;
    if(i % 2 === 0){
      // 주식 몰빵형: 8~10주 (현금 0~20)
      shares = maxShares - Math.floor(Math.random()*3);
    } else {
      // 현금 몰빵형: 0~2주 (현금 80~100)
      shares = Math.floor(Math.random()*3);
    }
    shares = Math.max(0, Math.min(maxShares, shares));
    const cash = Math.round((100 - shares * price) * 100) / 100;
    res[n] = { cash, shares };
  });
  return res;
}

async function startSession(){
  S.busy = true; render();
  const totalRounds = Math.max(1, Math.min(60, Number(S.editRounds)||10));
  const dividendValues = S.editDividends.map(v=>Math.max(0, Number(v)||0));
  const expDiv = expectedDividend(dividendValues);
  const startPrice = computeFundamental(1, totalRounds, expDiv);
  const players = allocateHoldings(S.participantNames, startPrice);
  const config = { status:'active', totalRounds, dividendValues, currentRound:1, hostClaimed:true, startPrice };
  const round = { round:1, status:'collecting', fundamentalValue: startPrice, clearingPrice:null, volume:null, dividendValue:null };
  await updatePaths({ '/config': config, '/round': round, '/history': null, '/orders': null, '/players': players });
  S.history = [];
  S.busy = false;
  await loadAll();
}

async function calcEquilibrium(){
  S.busy = true; S.flashError = ''; render();
  // 서버의 최신 라운드 상태 기준으로 진행 (이미 계산됐으면 그대로 표시)
  const round = await getJSON('round', S.round);
  if(!round || round.status !== 'collecting'){
    S.busy = false; await loadAll(); return;
  }
  const ordersObj = await getJSON(`orders/${round.round}`, {});
  const players = await getJSON('players', null);
  if(!players || !Object.keys(players).length){
    S.busy = false; S.flashError = '참가자 자산을 읽지 못했습니다. 새로고침 후 다시 시도하세요.'; render(); return;
  }
  // 주문을 1주 단위로 분해 (수량 지원). 자산 한도를 넘는 수량은 자동으로 잘라낸다.
  const bids = [], asks = [];
  Object.entries(ordersObj || {}).forEach(([name, o])=>{
    const p = players[name] || {cash:0, shares:0};
    if(o && o.bid !== null && o.bid !== undefined && !isNaN(o.bid)){
      const price = Number(o.bid);
      const wantQty = Math.max(1, Math.floor(Number(o.bidQty)||1));
      const affordable = price > 0 ? Math.floor(p.cash / price) : wantQty;
      const qty = Math.min(wantQty, affordable);
      for(let u=0; u<qty; u++) bids.push({name, price});
    }
    if(o && o.ask !== null && o.ask !== undefined && !isNaN(o.ask)){
      const price = Number(o.ask);
      const wantQty = Math.max(1, Math.floor(Number(o.askQty)||1));
      const qty = Math.min(wantQty, p.shares||0);
      for(let u=0; u<qty; u++) asks.push({name, price});
    }
  });
  bids.sort((a,b)=>b.price-a.price);
  asks.sort((a,b)=>a.price-b.price);
  const n = Math.min(bids.length, asks.length);
  let k = 0;
  for(let i=0;i<n;i++){ if(bids[i].price >= asks[i].price) k = i+1; else break; }
  let price = null;
  if(k > 0){
    price = Math.round((bids[k-1].price + asks[k-1].price)/2 * 100)/100;
    // 실제 체결: 상위 k 매수자와 하위 k 매도자 간 1주씩, 균형가로 현금·주식 이동
    for(let i=0;i<k;i++){
      const buyer = players[bids[i].name];
      const seller = players[asks[i].name];
      buyer.cash = Math.round((buyer.cash - price)*100)/100;
      buyer.shares = (buyer.shares||0) + 1;
      seller.cash = Math.round((seller.cash + price)*100)/100;
      seller.shares = (seller.shares||0) - 1;
    }
  }
  // 미체결 시 가격은 존재하지 않는다. 참고용 호가 스프레드만 기록.
  const bestBid = bids[0] ? bids[0].price : null;
  const bestAsk = asks[0] ? asks[0].price : null;
  const trades = k>0 ? Array.from({length:k}, (_,i)=>({buyer:bids[i].name, seller:asks[i].name})) : [];
  const ok = await updatePaths({
    '/round': {...round, status:'calculated', clearingPrice:price, volume:k, trades, bestBid, bestAsk},
    '/players': players
  });
  if(!ok){ S.busy = false; S.flashError = '체결 결과 저장에 실패했습니다. 새로고침 후 균형가 계산을 다시 눌러주세요.'; render(); return; }
  S.flashError = '';
  S.busy = false;
  await loadAll();
}

async function rollDice(){
  S.rolling = true; render();
  const values = S.config.dividendValues;
  let ticks = 0;
  const spin = setInterval(()=>{
    S.rollDisplay = values[Math.floor(Math.random()*values.length)];
    render();
    ticks++;
    if(ticks > 14){ clearInterval(spin); finishRoll(values); }
  }, 90);
}
async function finishRoll(values){
  const final = rollWeightedDividend(values);
  S.rollDisplay = final; render();
  // 중복 지급 방지: 서버의 현재 라운드 상태를 다시 확인
  const round = await getJSON('round', S.round);
  if(!round || round.status === 'revealed'){
    S.rolling = false;
    await loadAll();
    return;
  }
  // 배당 지급: 보유 주식 1주당 배당액만큼 현금 증가
  let players = await getJSON('players', null);
  if(!players || !Object.keys(players).length){
    // 읽기 실패 시 1회 재시도 — 자산 데이터를 빈 값으로 덮어쓰는 사고 방지
    players = await getJSON('players', null);
  }
  if(!players || !Object.keys(players).length){
    S.rolling = false;
    S.flashError = '참가자 자산을 읽지 못해 배당을 확정하지 못했습니다. 새로고침 후 배당 추첨을 다시 눌러주세요.';
    render(); return;
  }
  // 참가자별 변동 내역: 거래(매수/매도)와 배당을 분리 기록 → 다음 라운드 피드백에 사용
  const rTrades = round.trades || [];
  const playerChanges = {};
  Object.entries(players).forEach(([n, p])=>{
    const buys = rTrades.filter(t=>t.buyer===n).length;
    const sells = rTrades.filter(t=>t.seller===n).length;
    const price = round.clearingPrice ?? null;
    const divCash = Math.round((p.shares||0) * final * 100)/100;
    playerChanges[n] = {
      buys, sells, price,
      buyCash: price!=null ? Math.round(buys*price*100)/100 : 0,
      sellCash: price!=null ? Math.round(sells*price*100)/100 : 0,
      divCash,
      sharesHeld: p.shares||0
    };
  });
  Object.values(players).forEach(p=>{
    p.cash = Math.round((p.cash + (p.shares||0) * final)*100)/100;
  });
  const updated = {...round, status:'revealed', dividendValue: final};
  const histEntry = { round: round.round, fundamental: round.fundamentalValue, clearingPrice: round.clearingPrice ?? null, volume: round.volume ?? null, bestBid: round.bestBid ?? null, bestAsk: round.bestAsk ?? null, dividendValue: final, playerChanges };
  let ok = await updatePaths({ '/round': updated, [`/history/${round.round}`]: histEntry, '/players': players });
  if(!ok){ ok = await updatePaths({ '/round': updated, [`/history/${round.round}`]: histEntry, '/players': players }); }
  if(!ok){
    S.rolling = false;
    S.flashError = '배당 결과 저장에 실패했습니다. 새로고침 후 배당 추첨을 다시 눌러주세요.';
    render(); return;
  }
  S.flashError = '';
  S.rolling = false;
  await loadAll();
}

async function nextRound(){
  S.busy = true; S.flashError = ''; render();
  // 메모리의 낡은 값이 아니라 서버의 최신 라운드 번호를 기준으로 진행 (루프 방지)
  const config = await getJSON('config', S.config);
  if(!config || config.status !== 'active'){
    S.busy = false; S.flashError = '서버에서 세션 정보를 읽지 못했습니다. 새로고침 후 다시 시도하세요.';
    render(); return;
  }
  const freshRound = await getJSON('round', S.round);
  const baseNum = Math.max(config.currentRound || 0, freshRound && freshRound.round ? freshRound.round : 0);
  const newRoundNum = baseNum + 1;
  const expDiv = expectedDividend(config.dividendValues);
  const round = { round:newRoundNum, status:'collecting', fundamentalValue: computeFundamental(newRoundNum, config.totalRounds, expDiv), clearingPrice:null, volume:null, dividendValue:null };
  const ok = await updatePaths({ '/config/currentRound': newRoundNum, '/round': round });
  if(!ok){ S.busy = false; S.flashError = '다음 라운드 저장에 실패했습니다. 다시 시도하세요.'; render(); return; }
  S.busy = false;
  await loadAll();
}

async function endSession(){
  S.busy = true; render();
  await updatePaths({ '/config/status': 'ended' });
  S.busy = false;
  await loadAll();
}

async function submitOrder(pass){
  let bid = null, ask = null, bidQty = 0, askQty = 0;
  if(!pass){
    bid = S.bidInput === '' ? null : Number(S.bidInput);
    ask = S.askInput === '' ? null : Number(S.askInput);
    bidQty = Math.max(1, Math.floor(Number(S.bidQty)||1));
    askQty = Math.max(1, Math.floor(Number(S.askQty)||1));
    if((bid===null||isNaN(bid)) && (ask===null||isNaN(ask))) return;
    // 보유 자산 검증 (수량 반영)
    const p = S.myPlayer || {cash:0, shares:0};
    if(bid!==null && !isNaN(bid) && bid * bidQty > p.cash){
      S.orderError = `현금이 부족합니다: ${fmt(bid)} × ${bidQty}주 = ${fmt(bid*bidQty)} 필요 (보유 ${fmt(p.cash)}).`;
      render(); return;
    }
    if(ask!==null && !isNaN(ask) && askQty > (p.shares||0)){
      S.orderError = `보유 주식이 부족합니다 (보유 ${p.shares||0}주, 매도 시도 ${askQty}주).`;
      render(); return;
    }
  }
  S.busy = true; S.orderError = ''; render();
  const ok = await setJSON(`orders/${S.round.round}/${S.safeName}`, {
    bid: (bid===null||isNaN(bid)) ? null : Math.max(0,bid),
    bidQty: (bid===null||isNaN(bid)) ? null : bidQty,
    ask: (ask===null||isNaN(ask)) ? null : Math.max(0,ask),
    askQty: (ask===null||isNaN(ask)) ? null : askQty,
    pass: !!pass,
    submittedAt: Date.now()
  });
  S.busy = false;
  if(!ok){ S.orderError = '서버 저장 실패 — 새로고침 후 다시 시도하세요.'; render(); return; }
  S.bidInput=''; S.askInput=''; S.bidQty='1'; S.askQty='1';
  await loadAll();
}

async function resetSession(){
  S.busy = true; render();
  const wiped = await updatePaths({ '/config': null, '/round': null, '/history': null, '/participants': null, '/orders': null, '/players': null });
  if(wiped){ S.config = null; S.round = null; S.history = []; S.participantNames = []; S.players = {}; S.myPlayer = null; }
  S.confirmingReset = false; S.busy = false;
  S.editRounds = 10; S.editDividends = DEFAULT_DIVIDENDS.slice();
  await loadAll();
}

// 최종 분석용 계산: 사후(ex-post) 실제가치 = 그 라운드부터 끝까지 "실제로 지급된" 배당의 합
function computeFinalStats(){
  const hist = S.history;
  const n = hist.length;
  const actualValue = new Array(n).fill(0);
  let cum = 0;
  for(let i=n-1; i>=0; i--){
    cum += (hist[i].dividendValue || 0);
    actualValue[i] = cum;
  }
  const totalDividends = cum; // 1라운드 시점의 실제가치 = 전체 실제 배당 합
  const hits = hist.filter(h=>(h.dividendValue||0)>0).length;
  const deviations = hist.map(h=> (h.volume>0 && h.clearingPrice!=null) ? Math.round((h.clearingPrice - h.fundamental)*100)/100 : null);
  const validDev = deviations.filter(d=>d!=null);
  const avgDev = validDev.length ? Math.round(validDev.reduce((a,b)=>a+b,0)/validDev.length*100)/100 : null;
  let maxDev = null, maxDevRound = null;
  hist.forEach((h,i)=>{
    if(deviations[i]!=null && (maxDev===null || Math.abs(deviations[i]) > Math.abs(maxDev))){ maxDev = deviations[i]; maxDevRound = h.round; }
  });
  return { actualValue, totalDividends, hits, n, deviations, avgDev, maxDev, maxDevRound };
}

  if(!S.history.length || !S.safeName) return '';
  const last = S.history[S.history.length - 1];
  const ch = last.playerChanges ? last.playerChanges[S.safeName] : null;
  if(!ch) return '';
  const net = (ch.divCash||0) + (ch.sellCash||0) - (ch.buyCash||0);
  const divHit = (last.dividendValue||0) > 0;
  return `
    <div class="panel panel-tight">
      <h3 style="font-size:14px; margin-bottom:8px;">지난 라운드(R${last.round}) 내 결산</h3>
      <table>
        <tbody>
          <tr><td>배당 ${divHit?`<span class="tag-bid">✓ ${fmt(last.dividendValue)}/주</span>`:`<span style="color:var(--danger)">✗ 0/주</span>`} × 보유 ${ch.sharesHeld}주</td><td class="mono" style="text-align:right;">${signedAmt(ch.divCash||0)}</td></tr>
          ${ch.buys>0 ? `<tr><td>주식 매수 ${ch.buys}주 (체결가 ${fmt(ch.price)})</td><td class="mono" style="text-align:right;">${signedAmt(-(ch.buyCash||0))}</td></tr>` : ''}
          ${ch.sells>0 ? `<tr><td>주식 매도 ${ch.sells}주 (체결가 ${fmt(ch.price)})</td><td class="mono" style="text-align:right;">${signedAmt(ch.sellCash||0)}</td></tr>` : ''}
          <tr><td><strong>현금 순변동</strong></td><td class="mono" style="text-align:right; font-size:16px;"><strong>${signedAmt(net)}</strong></td></tr>
        </tbody>
      </table>
    </div>`;
}
function priceDisplay(r){
  if(r && r.volume > 0 && r.clearingPrice != null) return `<span class="mono tag-bid">${fmt(r.clearingPrice)}</span>`;
  const bb = r && r.bestBid != null ? fmt(r.bestBid) : '—';
  const ba = r && r.bestAsk != null ? fmt(r.bestAsk) : '—';
  return `<span class="mono" style="color:var(--ink-dim);">체결 없음</span> <span class="small mono">(매수최고 ${bb} / 매도최저 ${ba})</span>`;
}
function dbChip(){
  if(S.dbStatus === 'ok') return `<span class="badge" style="color:var(--bid);">DB ✓</span>`;
  if(S.dbStatus === 'readonly') return `<span class="badge" style="color:var(--danger);">DB 쓰기거부</span>`;
  if(S.dbStatus === 'error') return `<span class="badge" style="color:var(--danger);">DB 연결안됨</span>`;
  return `<span class="badge">DB 확인중</span>`;
}
function renderTicker(){
  const c = S.config; const r = S.round;
  const updated = S.lastUpdated ? S.lastUpdated.toLocaleTimeString('ko-KR') : '아직 없음';
  return `
    <div class="ticker">
      <div class="status-line">${statusBadge()}${dbChip()}<span class="mono">${c && c.status!=='lobby' ? `라운드 ${r?r.round:c.currentRound} / ${c.totalRounds}` : '세션 준비 중'}</span></div>
      <div class="status-line mono">${(()=>{ const c2=S.config; if(c2 && c2.status==='ended' && r) return `펀더멘털 <span class="tag-fund">${fmt(r.fundamentalValue)}</span>`; for(let i=S.history.length-1;i>=0;i--){ const h=S.history[i]; if(h.volume>0 && h.clearingPrice!=null) return `직전 체결가 <span class="tag-bid">${fmt(h.clearingPrice)}</span> <span class="small">(R${h.round})</span>`; } return ''; })()}</div>
      <div class="row" style="gap:10px;">
        <span class="small mono">확인 시각 ${updated}</span>
        <button class="ghost" id="refreshBtn" ${S.refreshing?'disabled':''}>${S.refreshing?'새로고침 중…':'⟳ 새로고침'}</button>
      </div>
    </div>
  `;
}
function renderHistoryTable(showFund){
  if(!S.history.length) return `<p class="small">아직 완료된 라운드가 없습니다.</p>`;
  return `
    <table>
      <thead><tr><th>라운드</th>${showFund?'<th>펀더멘털</th>':''}<th>체결가</th><th>거래량</th><th>배당 결과</th></tr></thead>
      <tbody>
        ${S.history.map(h=>{
          const hit = (h.dividendValue||0) > 0;
          return `
          <tr>
            <td class="mono">${h.round}</td>
            ${showFund?`<td class="mono tag-fund">${fmt(h.fundamental)}</td>`:''}
            <td class="mono">${h.volume>0 ? `<span class="tag-bid">${fmt(h.clearingPrice)}</span>` : `<span style="color:var(--ink-faint);">체결 없음</span>`}</td>
            <td class="mono">${h.volume ?? 0}</td>
            <td class="mono">${hit ? `<span class="tag-bid">✓ 성공 (+${fmt(h.dividendValue)})</span>` : `<span style="color:var(--danger)">✗ 실패 (0)</span>`}</td>
          </tr>`;}).join('')}
      </tbody>
    </table>
  `;
}
function renderParticipantsPanel(){
  return `
    <div class="panel panel-tight">
      <div class="row between">
        <h3 style="font-size:14px;">접속한 참가자 <span class="mono tag-bid">${S.participantNames.length}명</span></h3>
      </div>
      ${S.participantNames.length
        ? `<div class="row" style="margin-top:8px;">${S.participantNames.map(n=>`<span class="badge">${n}${n===S.safeName?' (나)':''}</span>`).join('')}</div>`
        : `<p class="small" style="margin-top:6px;">아직 없음 — 새로고침으로 갱신됩니다.</p>`}
    </div>
  `;
}
function renderHoldingsTable(){
  const entries = Object.entries(S.players || {});
  if(!entries.length) return '';
  return `
    <div class="panel">
      <h3 style="font-size:15px; margin-bottom:10px;">참가자 보유 현황 (진행자만 보임)</h3>
      <table>
        <thead><tr><th>이름</th><th>현금</th><th>주식</th></tr></thead>
        <tbody>
          ${entries.map(([n,p])=>`<tr><td>${n}</td><td class="mono tag-bid">${fmt(p.cash)}</td><td class="mono tag-fund">${p.shares||0}주</td></tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
function renderLeaderboard(){
  const entries = Object.entries(S.players || {});
  if(!entries.length) return '';
  const ranked = entries.map(([n,p])=>({name:n, cash:p.cash, shares:p.shares||0, final: Math.round((p.cash)*100)/100}))
    .sort((a,b)=>b.final-a.final);
  return `
    <div class="panel">
      <h3 style="font-size:15px; margin-bottom:4px;">최종 순위</h3>
      <p class="small" style="margin-bottom:12px;">게임 종료 시점에 주식의 가치는 0이므로, 최종 자산 = 남은 현금입니다. 시작 자산은 모두 100이었습니다.</p>
      <table>
        <thead><tr><th>순위</th><th>이름</th><th>최종 자산</th><th>수익</th><th>잔여 주식</th></tr></thead>
        <tbody>
          ${ranked.map((p,i)=>{
            const profit = Math.round((p.final-100)*100)/100;
            return `<tr>
              <td class="mono">${i+1}</td><td>${p.name}</td>
              <td class="mono tag-bid">${fmt(p.final)}</td>
              <td class="mono" style="color:${profit>=0?'var(--bid)':'var(--danger)'};">${profit>0?'+':''}${fmt(profit)}</td>
              <td class="mono">${p.shares}주 (가치 0)</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`;
}
function renderChartBlock(){
  return `<div class="panel"><h3 style="font-size:15px; margin-bottom:12px;">시장 가격 추이</h3><canvas id="priceChart" height="160"></canvas></div>`;
}

function attachHostEvents(){
  const refreshBtn = document.getElementById('refreshBtn');
  if(refreshBtn) refreshBtn.onclick = manualRefresh;
  const codeField = document.getElementById('codeField');
  const codeSaveBtn = document.getElementById('codeSaveBtn');
  if(codeSaveBtn) codeSaveBtn.onclick = async ()=>{
    const val = (codeField.value||'').trim();
    if(!val) return;
    await setJSON('settings/inviteCode', val);
    S.inviteCode = val;
    render();
  };
  const roundsField = document.getElementById('roundsField');
  if(roundsField) roundsField.oninput = (e)=>{ S.editRounds = e.target.value; };
  document.querySelectorAll('.divInput').forEach(inp=>{ inp.oninput = (e)=>{ S.editDividends[Number(e.target.dataset.idx)] = e.target.value; }; });
  const startBtn = document.getElementById('startBtn'); if(startBtn) startBtn.onclick = startSession;
  const calcBtn = document.getElementById('calcBtn'); if(calcBtn) calcBtn.onclick = calcEquilibrium;
  const rollBtn = document.getElementById('rollBtn'); if(rollBtn) rollBtn.onclick = rollDice;
  const nextBtn = document.getElementById('nextBtn'); if(nextBtn) nextBtn.onclick = nextRound;
  const endBtn = document.getElementById('endBtn'); if(endBtn) endBtn.onclick = endSession;
  const resetBtn = document.getElementById('resetBtn'); if(resetBtn) resetBtn.onclick = ()=>{ S.confirmingReset = true; render(); };
  const confirmResetBtn = document.getElementById('confirmResetBtn'); if(confirmResetBtn) confirmResetBtn.onclick = resetSession;
  const cancelResetBtn = document.getElementById('cancelResetBtn'); if(cancelResetBtn) cancelResetBtn.onclick = ()=>{ S.confirmingReset = false; render(); };
}

  const bidQtyField = document.getElementById('bidQtyField');
  const askQtyField = document.getElementById('askQtyField');
  if(bidQtyField) bidQtyField.oninput = (e)=>{ S.bidQty = e.target.value; };
  if(askQtyField) askQtyField.oninput = (e)=>{ S.askQty = e.target.value; };
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.onclick = ()=>submitOrder(false);
  const passBtn = document.getElementById('passBtn');
  if(passBtn) passBtn.onclick = ()=>submitOrder(true);
}
async function init(){
  if(NEEDS_SETUP){ render(); return; }
  // 1) DB 응답을 기다리지 않고 즉시 첫 화면을 그린다 (연결이 멈춰도 빈 화면 방지)
  S.inviteCode = FALLBACK_CODE;
  try{
    if(sessionStorage.getItem('bubblelab_gate') === 'ok') S.gateOk = true;
  }catch(e){}
  render();
  // 2) 배경에서 읽기/쓰기 상태를 각각 확인 (7초 제한)
  if(!db){ S.dbStatus = 'error'; render(); return; }
  let readOk = false, writeOk = false;
  try{
    const snap = await withTimeout(db.ref('settings/inviteCode').get(), 7000);
    readOk = true;
    if(snap.exists()) S.inviteCode = snap.val();
  }catch(e){ console.error('DB 읽기 실패', e); }
  try{
    await withTimeout(db.ref('health/lastPing').set(Date.now()), 7000);
    writeOk = true;
  }catch(e){ console.error('DB 쓰기 실패', e); }
  S.dbStatus = (readOk && writeOk) ? 'ok' : (readOk ? 'readonly' : 'error');
  render();
}
init();
</script>
